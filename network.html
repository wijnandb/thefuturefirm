<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.perceptum.nl; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://analytics.perceptum.nl">
    <title>Het Netwerk — The Future Firm</title>
    <script>
        (function() {
            const stored = localStorage.getItem('theme');
            const theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <style>
        @font-face {
            font-family: 'GT Cinetype';
            src: url('GT-Cinetype-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --display: 'GT Cinetype', Helvetica, Arial, sans-serif;
            --body: 'GT Cinetype', Helvetica, Arial, sans-serif;
            --mono: 'GT Cinetype', Helvetica, Arial, sans-serif;
        }

        :root, [data-theme="light"] {
            --bg: #ffffff;
            --fg: #231f20;
            --warm: #231f20;
            --ember: #231f20;
            --muted: #6b6b6b;
            --surface: #f7f7f7;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --fg: #f0f0f0;
            --warm: #f0f0f0;
            --ember: #f0f0f0;
            --muted: #999999;
            --surface: #222222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 17px; }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: var(--body);
            font-weight: 400;
            overflow: hidden;
            transition: background 0.4s ease, color 0.4s ease;
        }

        ::selection { background: var(--warm); color: var(--bg); }

        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 3rem;
            background: var(--bg);
        }

        .nav-left {
            display: flex; align-items: center; gap: 2rem;
        }

        .logo {
            display: inline-block; height: 1.2rem;
            color: var(--fg); text-decoration: none;
        }

        .logo img { height: 100%; width: auto; }
        [data-theme="dark"] .logo img { filter: invert(1); }

        .nav-links {
            display: flex; gap: 1.5rem;
            font-family: var(--mono); font-size: 0.8rem;
            letter-spacing: 0.08em;
        }

        .nav-links a {
            color: var(--muted); text-decoration: none; transition: color 0.3s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--warm); }

        .theme-toggle {
            background: none; border: none; cursor: pointer;
            font-size: 1.1rem; padding: 0.5rem;
            color: var(--muted); transition: color 0.3s;
        }
        .theme-toggle:hover { color: var(--warm); }
        .theme-toggle .icon-sun { display: none; }
        .theme-toggle .icon-moon { display: block; }
        [data-theme="light"] .theme-toggle .icon-sun { display: block; }
        [data-theme="light"] .theme-toggle .icon-moon { display: none; }

        #network-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        footer {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            padding: 1rem 3rem; border-top: 1px solid rgba(0,0,0,0.08);
            display: flex; justify-content: space-between;
            font-family: var(--mono); font-size: 0.75rem;
            letter-spacing: 0.08em; color: var(--muted);
            background: var(--bg);
        }

        footer a { color: var(--muted); text-decoration: none; transition: color 0.3s; }
        footer a:hover { color: var(--warm); }

        @media (max-width: 900px) {
            nav { padding: 1.2rem 1.5rem; }
            .nav-left { gap: 1rem; }
            .nav-links { font-size: 0.7rem; gap: 1rem; }
            footer { padding: 0.8rem 1.5rem; font-size: 0.65rem; flex-wrap: wrap; gap: 0.4rem; justify-content: center; }
        }
    </style>
    <script src="https://analytics.perceptum.nl/liveview.js?key=lv_live_FKiLqqr_XVGGvdsb93ct6i6ziZgJ_EJS" defer></script>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="index.html" class="logo"><img src="TFF Logo.svg" alt="The Future Firm"></a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="network.html" class="active">Het Netwerk</a>
            </div>
        </div>
        <button class="theme-toggle" aria-label="Toggle theme">
            <span class="icon-sun">&#9788;</span>
            <span class="icon-moon">&#9790;</span>
        </button>
    </nav>

    <canvas id="network-canvas"></canvas>

    <footer>
        <span>The Future Firm — Amsterdam</span>
        <span>Since 2007</span>
        <a href="privacy.html">Privacy Policy</a>
    </footer>

    <script>
    (function() {
        // Theme toggle
        const toggle = document.querySelector('.theme-toggle');
        const getPreferredTheme = () => {
            const stored = localStorage.getItem('theme');
            if (stored) return stored;
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        };
        const setTheme = (theme) => {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        };
        setTheme(getPreferredTheme());
        toggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        });

        // Canvas setup
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        const isMobile = () => window.innerWidth < 768;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Theme-aware colors
        function getColors() {
            const style = getComputedStyle(document.documentElement);
            return {
                bg: style.getPropertyValue('--bg').trim(),
                fg: style.getPropertyValue('--fg').trim(),
                muted: style.getPropertyValue('--muted').trim(),
                surface: style.getPropertyValue('--surface').trim(),
            };
        }

        // Network data
        const partners = [
            {
                id: 'nomadica', label: 'La Nomadica',
                description: 'Designing extraordinary gatherings with local soul. Logistical creativity rooted in place.',
                url: 'https://lanomadica.com',
                capabilities: ['Logistical Design', 'Logistical Production', 'Local Suppliers']
            },
            {
                id: 'lemonpress', label: 'Lemonpress',
                description: 'Visual storytelling that captures the essence of transformation.',
                url: 'https://lemonpress.nl',
                capabilities: ['Visual Design', 'Artwork', 'Print']
            },
            {
                id: 'una', label: 'UNA',
                description: 'Immersive experiences in nature that reconnect people to what matters.',
                url: 'https://una.earth',
                capabilities: ['Immersive Natural Experiences', 'Natural Design', 'Whole System Interventions']
            },
            {
                id: 'perceptum', label: 'Perceptum',
                description: 'Digital infrastructure and design solutions that just work.',
                url: 'https://perceptum.nl',
                capabilities: ['IT Systems', 'Digital Design & Solutions']
            },
            {
                id: 'talentlife', label: 'Talent Life',
                description: 'Developing young talent through community, mentorship, and real-world challenges.',
                url: 'https://talentlife.nl',
                capabilities: ['Youth Development', 'Communities', 'Peer Groups', 'Education']
            },
            {
                id: 'widening', label: 'Widening Horizons',
                description: 'Broadening perspectives through curated cultural and intellectual encounters.',
                url: 'https://wideninghorizons.nl',
                capabilities: ['Cultural Encounters', 'Perspective Shifts', 'Global Awareness']
            }
        ];

        // Build nodes and edges
        const nodes = [];
        const edges = [];
        const mobile = isMobile();
        const baseR = mobile ? 38 : 52;
        const capR = mobile ? 18 : 24;

        // Center node
        nodes.push({
            id: 'tff', label: 'THE FUTURE\nFIRM', type: 'center',
            x: W / 2, y: H / 2, vx: 0, vy: 0,
            radius: baseR * 1.3, pinned: true,
            description: '', url: ''
        });

        // Partner and capability nodes
        partners.forEach((p, i) => {
            const angle = (i / partners.length) * Math.PI * 2 - Math.PI / 2;
            const dist = mobile ? 160 : 240;
            nodes.push({
                id: p.id, label: p.label, type: 'partner',
                x: W / 2 + Math.cos(angle) * dist,
                y: H / 2 + Math.sin(angle) * dist,
                vx: 0, vy: 0, radius: baseR,
                description: p.description, url: p.url,
                expanded: false, expandAnim: 0
            });
            edges.push({ source: 'tff', target: p.id });

            p.capabilities.forEach((cap, j) => {
                const capAngle = angle + ((j - (p.capabilities.length - 1) / 2) * 0.35);
                const capDist = dist + (mobile ? 70 : 100);
                const capId = p.id + '-cap-' + j;
                nodes.push({
                    id: capId, label: cap, type: 'capability',
                    x: W / 2 + Math.cos(capAngle) * capDist,
                    y: H / 2 + Math.sin(capAngle) * capDist,
                    vx: 0, vy: 0, radius: capR,
                    parent: p.id, description: '', url: ''
                });
                edges.push({ source: p.id, target: capId });
            });
        });

        // Node lookup
        function getNode(id) { return nodes.find(n => n.id === id); }

        // Physics constants
        const SPRING_LENGTH_CENTER = mobile ? 160 : 240;
        const SPRING_LENGTH_CAP = mobile ? 70 : 100;
        const SPRING_K = 0.003;
        const REPULSION = 4000;
        const DAMPING = 0.85;
        const CENTER_GRAVITY = 0.0004;
        const DT = 1;

        // Physics step
        function simulate() {
            // Repulsion between all nodes
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const a = nodes[i], b = nodes[j];
                    let dx = b.x - a.x, dy = b.y - a.y;
                    let dist = Math.sqrt(dx * dx + dy * dy) || 1;
                    let minDist = a.radius + b.radius + 10;
                    let force = REPULSION / (dist * dist);
                    // Stronger repulsion when overlapping
                    if (dist < minDist) force *= 3;
                    let fx = (dx / dist) * force;
                    let fy = (dy / dist) * force;
                    if (!a.pinned) { a.vx -= fx * DT; a.vy -= fy * DT; }
                    if (!b.pinned) { b.vx += fx * DT; b.vy += fy * DT; }
                }
            }

            // Spring forces on edges
            edges.forEach(e => {
                const a = getNode(e.source), b = getNode(e.target);
                if (!a || !b) return;
                let dx = b.x - a.x, dy = b.y - a.y;
                let dist = Math.sqrt(dx * dx + dy * dy) || 1;
                let ideal = b.type === 'capability' ? SPRING_LENGTH_CAP : SPRING_LENGTH_CENTER;
                let force = (dist - ideal) * SPRING_K;
                let fx = (dx / dist) * force;
                let fy = (dy / dist) * force;
                if (!a.pinned) { a.vx += fx * DT; a.vy += fy * DT; }
                if (!b.pinned) { b.vx -= fx * DT; b.vy -= fy * DT; }
            });

            // Center gravity + damping + position update
            nodes.forEach(n => {
                if (n.pinned || n === dragNode) return;
                n.vx += (W / 2 - n.x) * CENTER_GRAVITY;
                n.vy += (H / 2 - n.y) * CENTER_GRAVITY;
                n.vx *= DAMPING;
                n.vy *= DAMPING;
                n.x += n.vx * DT;
                n.y += n.vy * DT;
                // Keep in bounds
                n.x = Math.max(n.radius, Math.min(W - n.radius, n.x));
                n.y = Math.max(n.radius + 60, Math.min(H - n.radius - 50, n.y));
            });
        }

        // Expand animation
        function updateExpand() {
            nodes.forEach(n => {
                if (n.type !== 'partner') return;
                const target = n.expanded ? 1 : 0;
                n.expandAnim += (target - n.expandAnim) * 0.12;
                if (Math.abs(n.expandAnim - target) < 0.005) n.expandAnim = target;
            });
        }

        // Drawing
        function draw() {
            const colors = getColors();
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = colors.bg;
            ctx.fillRect(0, 0, W, H);

            // Draw edges
            edges.forEach(e => {
                const a = getNode(e.source), b = getNode(e.target);
                if (!a || !b) return;
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                if (b.type === 'capability') {
                    ctx.setLineDash([4, 4]);
                    ctx.strokeStyle = colors.muted + '40';
                } else {
                    ctx.setLineDash([]);
                    ctx.strokeStyle = colors.muted + '60';
                }
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.setLineDash([]);
            });

            // Draw nodes
            nodes.forEach(n => {
                const isExpanded = n.expandAnim > 0.01;
                let r = n.radius;

                if (n.type === 'center') {
                    // Center node — filled
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
                    ctx.fillStyle = colors.fg;
                    ctx.fill();

                    // Label
                    ctx.fillStyle = colors.bg;
                    ctx.font = `${mobile ? 9 : 11}px GT Cinetype, Helvetica, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const lines = n.label.split('\n');
                    lines.forEach((line, i) => {
                        ctx.fillText(line, n.x, n.y + (i - (lines.length - 1) / 2) * (mobile ? 12 : 14));
                    });

                } else if (n.type === 'partner') {
                    const expandR = r + n.expandAnim * (mobile ? 50 : 70);

                    // Partner circle — filled
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, expandR, 0, Math.PI * 2);
                    ctx.fillStyle = colors.surface;
                    ctx.fill();
                    ctx.strokeStyle = colors.fg + (isExpanded ? 'cc' : '60');
                    ctx.lineWidth = isExpanded ? 2 : 1.5;
                    ctx.stroke();

                    if (isExpanded && n.expandAnim > 0.3) {
                        // Expanded: label at top, description centered, URL at bottom
                        const alpha = Math.min((n.expandAnim - 0.3) / 0.7, 1);
                        ctx.save();
                        ctx.globalAlpha = alpha;

                        // Partner name at top
                        ctx.fillStyle = colors.fg;
                        ctx.font = `bold ${mobile ? 11 : 13}px GT Cinetype, Helvetica, sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(n.label, n.x, n.y - expandR * 0.45);

                        // Description in center
                        ctx.fillStyle = colors.muted;
                        ctx.font = `${mobile ? 9 : 11}px GT Cinetype, Helvetica, sans-serif`;
                        const textW = expandR * 1.4;
                        wrapTextCentered(ctx, n.description, n.x, n.y - expandR * 0.1, textW, mobile ? 13 : 15);

                        // URL at bottom
                        if (n.url) {
                            ctx.fillStyle = colors.fg;
                            ctx.font = `${mobile ? 8 : 10}px GT Cinetype, Helvetica, sans-serif`;
                            ctx.fillText(n.url.replace('https://', ''), n.x, n.y + expandR * 0.55);
                        }

                        ctx.restore();
                    } else {
                        // Collapsed: just the label
                        ctx.fillStyle = colors.fg;
                        ctx.font = `${mobile ? 10 : 12}px GT Cinetype, Helvetica, sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(n.label, n.x, n.y);
                    }

                } else if (n.type === 'capability') {
                    // Capability node — dashed outline
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
                    ctx.setLineDash([3, 3]);
                    ctx.strokeStyle = colors.muted + '80';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    ctx.setLineDash([]);

                    // Label
                    ctx.fillStyle = colors.muted;
                    ctx.font = `${mobile ? 8 : 9}px GT Cinetype, Helvetica, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    wrapText(ctx, n.label, n.x - r + 4, n.y - (mobile ? 6 : 8), r * 2 - 8, mobile ? 10 : 12, true);
                }
            });
        }

        // Text wrapping helper
        function wrapText(ctx, text, x, y, maxW, lineH, centered) {
            const words = text.split(' ');
            let line = '';
            let curY = y;
            const lines = [];
            words.forEach(word => {
                const test = line ? line + ' ' + word : word;
                if (ctx.measureText(test).width > maxW && line) {
                    lines.push(line);
                    line = word;
                } else {
                    line = test;
                }
            });
            if (line) lines.push(line);

            if (centered) {
                const totalH = lines.length * lineH;
                curY = y + (lineH * 2 - totalH) / 2;
                ctx.textAlign = 'center';
                lines.forEach(l => {
                    ctx.fillText(l, x + maxW / 2 + (lineH / 4), curY);
                    curY += lineH;
                });
                ctx.textAlign = 'left';
            } else {
                lines.forEach(l => {
                    ctx.fillText(l, x, curY);
                    curY += lineH;
                });
            }
        }

        // Centered text wrapping helper (for inside circles)
        function wrapTextCentered(ctx, text, cx, startY, maxW, lineH) {
            const words = text.split(' ');
            let line = '';
            const lines = [];
            words.forEach(word => {
                const test = line ? line + ' ' + word : word;
                if (ctx.measureText(test).width > maxW && line) {
                    lines.push(line);
                    line = word;
                } else {
                    line = test;
                }
            });
            if (line) lines.push(line);
            const totalH = lines.length * lineH;
            let curY = startY - totalH / 2 + lineH / 2;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            lines.forEach(l => {
                ctx.fillText(l, cx, curY);
                curY += lineH;
            });
        }

        // Interaction state
        let dragNode = null;
        let dragOffX = 0, dragOffY = 0;
        let hoveredNode = null;

        function getNodeAt(mx, my) {
            // Check partners first (priority), then others
            for (let i = nodes.length - 1; i >= 0; i--) {
                const n = nodes[i];
                const r = n.type === 'partner' ? n.radius + (n.expandAnim || 0) * (isMobile() ? 50 : 70) : n.radius;
                const dx = mx - n.x, dy = my - n.y;
                if (dx * dx + dy * dy <= r * r) return n;
            }
            return null;
        }

        // Mouse events
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;

            if (dragNode) {
                dragNode.x = mx - dragOffX;
                dragNode.y = my - dragOffY;
                return;
            }

            const node = getNodeAt(mx, my);
            canvas.style.cursor = (node && node.type === 'partner') ? 'pointer' : 'default';

            // Hover expand
            if (hoveredNode && hoveredNode !== node) {
                hoveredNode.expanded = false;
            }
            if (node && node.type === 'partner') {
                node.expanded = true;
                hoveredNode = node;
            } else {
                hoveredNode = null;
            }
        });

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            const node = getNodeAt(mx, my);

            if (node && !node.pinned) {
                dragNode = node;
                dragOffX = mx - node.x;
                dragOffY = my - node.y;
                node.vx = 0; node.vy = 0;
            }

            // Click to toggle expand on partners
            if (node && node.type === 'partner') {
                node.expanded = !node.expanded;
                hoveredNode = node.expanded ? node : null;
            } else {
                // Click outside — collapse all
                nodes.forEach(n => { if (n.type === 'partner') n.expanded = false; });
                hoveredNode = null;
            }
        });

        canvas.addEventListener('mouseup', () => { dragNode = null; });
        canvas.addEventListener('mouseleave', () => {
            dragNode = null;
            if (hoveredNode) { hoveredNode.expanded = false; hoveredNode = null; }
        });

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const mx = touch.clientX - rect.left, my = touch.clientY - rect.top;
            const node = getNodeAt(mx, my);

            if (node && node.type === 'partner') {
                node.expanded = !node.expanded;
                hoveredNode = node.expanded ? node : null;
            } else {
                nodes.forEach(n => { if (n.type === 'partner') n.expanded = false; });
                hoveredNode = null;
            }

            if (node && !node.pinned) {
                dragNode = node;
                dragOffX = mx - node.x;
                dragOffY = my - node.y;
                node.vx = 0; node.vy = 0;
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!dragNode) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            dragNode.x = touch.clientX - rect.left - dragOffX;
            dragNode.y = touch.clientY - rect.top - dragOffY;
        }, { passive: false });

        canvas.addEventListener('touchend', () => { dragNode = null; });

        // Animation loop
        function loop() {
            simulate();
            updateExpand();
            draw();
            requestAnimationFrame(loop);
        }
        loop();

        // Re-center on resize
        window.addEventListener('resize', () => {
            const tff = getNode('tff');
            if (tff) { tff.x = W / 2; tff.y = H / 2; }
        });

    })();
    </script>

</body>

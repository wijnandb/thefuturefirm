<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.perceptum.nl; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://analytics.perceptum.nl">
    <title>Zaina — The Future Firm</title>
    <meta name="description" content="Zaina — Desk Research at The Future Firm. Meet the people behind culture and strategy transformation.">
    <script>
        (function() {
            const stored = localStorage.getItem('theme');
            const theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <style>
        @font-face {
            font-family: 'GT Cinetype';
            src: url('../GT-Cinetype-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --display: 'GT Cinetype', Helvetica, Arial, sans-serif;
            --body: 'GT Cinetype', Helvetica, Arial, sans-serif;
            --mono: 'GT Cinetype', Helvetica, Arial, sans-serif;
        }

        :root, [data-theme="light"] {
            --bg: #ffffff; --fg: #231f20; --warm: #231f20; --ember: #231f20; --muted: #6b6b6b; --surface: #f7f7f7;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a; --fg: #f0f0f0; --warm: #f0f0f0; --ember: #f0f0f0; --muted: #999999; --surface: #222222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 17px; scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: var(--body);
            font-weight: 400;
            overflow-x: hidden;
            transition: background 0.4s ease, color 0.4s ease;
        }

        ::selection { background: var(--warm); color: var(--bg); }

        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 3rem;
            background: var(--bg);
        }

        .logo {
            display: inline-block; height: 1.2rem;
            color: var(--fg); text-decoration: none;
        }

        .logo img { height: 100%; width: auto; }
        [data-theme="dark"] .logo img { filter: invert(1); }

        .theme-toggle {
            background: none; border: none; cursor: pointer;
            font-size: 1.1rem; padding: 0.5rem;
            color: var(--muted); transition: color 0.3s;
        }
        .theme-toggle:hover { color: var(--warm); }
        .theme-toggle .icon-sun { display: none; }
        .theme-toggle .icon-moon { display: block; }
        [data-theme="light"] .theme-toggle .icon-sun { display: block; }
        [data-theme="light"] .theme-toggle .icon-moon { display: none; }

        .profile {
            max-width: 640px;
            margin: 0 auto;
            padding: 8rem 3rem 6rem;
            text-align: center;
        }

        .photo-circle {
            width: 250px; height: 250px;
            border-radius: 50%;
            margin: 0 auto 2rem;
            overflow: hidden;
            border: 1.5px solid var(--fg);
            background: var(--surface);
            display: flex; align-items: center; justify-content: center;
        }

        .photo-circle .placeholder {
            font-family: var(--display);
            font-size: 4rem;
            color: var(--muted);
            opacity: 0.3;
        }

        h1 {
            font-family: var(--display);
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 400;
            line-height: 1.15;
            margin-bottom: 0.6rem;
        }

        .role {
            font-family: var(--mono);
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 3rem;
        }

        .bio {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--muted);
            margin-bottom: 3rem;
        }

        .back-link {
            font-family: var(--mono);
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: color 0.3s, border-color 0.3s;
        }

        .back-link:hover {
            color: var(--warm);
            border-color: var(--warm);
        }

        footer {
            padding: 2rem 3rem; border-top: 1px solid rgba(0,0,0,0.08);
            display: flex; justify-content: space-between;
            font-family: var(--mono); font-size: 0.8rem;
            letter-spacing: 0.08em; color: var(--muted);
        }

        footer a { color: var(--muted); text-decoration: none; transition: color 0.3s; }
        footer a:hover { color: var(--warm); }

        @media (max-width: 600px) {
            nav { padding: 1.2rem 1.5rem; }
            .profile { padding: 6rem 1.5rem 4rem; }
            footer { padding: 1.5rem; flex-direction: column; gap: 0.8rem; text-align: center; }
        }
    </style>
    <script src="https://analytics.perceptum.nl/liveview.js?key=lv_live_FKiLqqr_XVGGvdsb93ct6i6ziZgJ_EJS" defer></script>
</head>
<body>

    <nav>
        <a href="../index.html" class="logo"><img src="../TFF Logo.svg" alt="The Future Firm"></a>
        <button class="theme-toggle" aria-label="Toggle theme">
            <span class="icon-sun">&#9788;</span>
            <span class="icon-moon">&#9790;</span>
        </button>
    </nav>

    <main class="profile">
        <div class="photo-circle">
            <img src="photos/zaina_pothof.jpeg" alt="Zaina Pothof">
        </div>
        <h1>Zaina</h1>
        <p class="role">Desk Research</p>
        <p class="bio">Bio coming soon. Check back later.</p>
        <a href="../team.html" class="back-link">&#8592; Back to the team</a>
    </main>

    <footer>
        <span>The Future Firm — Amsterdam</span>
        <span>Since 2007</span>
        <a href="../privacy.html">Privacy Policy</a>
    </footer>

    <script>
        const toggle = document.querySelector('.theme-toggle');
        const getPreferredTheme = () => {
            const stored = localStorage.getItem('theme');
            if (stored) return stored;
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        };
        const setTheme = (theme) => {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        };
        setTheme(getPreferredTheme());
        toggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        });
    </script>

</body>
</html>
